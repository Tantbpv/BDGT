services:
  postgres:
    image: postgres:16-alpine
    container_name: bdgt_postgres
    environment:
      POSTGRES_DB: bdgt_dev
      POSTGRES_USER: bdgt
      POSTGRES_PASSWORD: bdgt_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bdgt"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bdgt_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bdgt.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
