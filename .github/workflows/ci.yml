name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

env:
  DATABASE_URL: postgresql://bdgt:bdgt_password@localhost:5432/bdgt
  JWT_ACCESS_SECRET: ci-secret-access-min-32-chars-aaaaaaaaa
  JWT_REFRESH_SECRET: ci-secret-refresh-min-32-chars-bbbbbbbbb

jobs:
  # ── Install & cache ───────────────────────────────────────────────────────
  dependencies:
    name: Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Save node_modules cache
        uses: ./.github/actions/save-node-modules

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"

      - uses: ./.github/actions/restore-node-modules

      - run: pnpm lint

  # ── Type check ────────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    needs: dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"

      - uses: ./.github/actions/restore-node-modules

      - run: pnpm type-check

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"

      - uses: ./.github/actions/restore-node-modules

      - run: pnpm test

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"

      - uses: ./.github/actions/restore-node-modules

      - run: pnpm build

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy (mock)
        run: echo "Deploying to production — approval granted."
