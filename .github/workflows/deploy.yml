name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC token exchange with AWS
  contents: read

jobs:
  # ── Build & push Docker images to ECR ────────────────────────────────────────
  build:
    name: Build & push
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    outputs:
      registry: ${{ steps.ecr-login.outputs.registry }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/bdgt-web:${{ github.event.workflow_run.head_sha || github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/bdgt-web:latest
          cache-from: type=gha,scope=bdgt-web
          cache-to: type=gha,scope=bdgt-web,mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: migrator
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/bdgt-migrate:${{ github.event.workflow_run.head_sha || github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/bdgt-migrate:latest
          # Reuses cached builder/deps layers from the web build above
          cache-from: type=gha,scope=bdgt-web

  # ── Deploy to EC2 ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get ECR registry URL
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "infra/compose/docker-compose.prod.yml,infra/compose/nginx.prod.conf"
          target: /home/ec2-user/bdgt
          strip_components: 2

      - name: Write .env and deploy
        uses: appleboy/ssh-action@v1
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        with:
          host: ${{ vars.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,SHA,AWS_REGION,DB_PASSWORD,JWT_ACCESS_SECRET,JWT_REFRESH_SECRET
          script: |
            # Authenticate Docker to ECR using the EC2 IAM instance role
            aws ecr get-login-password --region "${AWS_REGION}" | \
              docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            # Write .env — secrets are injected here from GitHub Secrets, never stored in git.
            # printf %s avoids backslash interpretation for secret values.
            {
              echo  "NODE_ENV=production"
              printf 'DATABASE_URL=postgresql://bdgt:%s@db:5432/bdgt\n' "${DB_PASSWORD}"
              echo  "POSTGRES_USER=bdgt"
              echo  "POSTGRES_DB=bdgt"
              printf 'POSTGRES_PASSWORD=%s\n'    "${DB_PASSWORD}"
              printf 'JWT_ACCESS_SECRET=%s\n'    "${JWT_ACCESS_SECRET}"
              printf 'JWT_REFRESH_SECRET=%s\n'   "${JWT_REFRESH_SECRET}"
              echo  "JWT_ACCESS_EXPIRES_IN=15m"
              echo  "JWT_REFRESH_EXPIRES_IN=7d"
              echo  "LOG_LEVEL=info"
              echo  "APP_IMAGE=${ECR_REGISTRY}/bdgt-web:${SHA}"
              echo  "MIGRATE_IMAGE=${ECR_REGISTRY}/bdgt-migrate:${SHA}"
            } > /home/ec2-user/bdgt/.env
            chmod 600 /home/ec2-user/bdgt/.env

            cd /home/ec2-user/bdgt
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
