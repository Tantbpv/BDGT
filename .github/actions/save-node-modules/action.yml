name: 'Save node_modules'
description: 'Saves pnpm node_modules to GitHub Actions cache (monorepo)'

runs:
  using: composite
  steps:
    - uses: actions/cache/save@v6
      with:
        path: |
          node_modules
          apps/*/node_modules
          packages/*/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
