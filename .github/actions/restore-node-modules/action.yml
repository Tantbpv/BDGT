name: 'Restore node_modules'
description: 'Restores pnpm node_modules from GitHub Actions cache (monorepo)'

outputs:
  cache-hit:
    description: '"true" when the exact key was found'
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - id: cache
      uses: actions/cache/restore@v4
      with:
        path: |
          node_modules
          apps/*/node_modules
          packages/*/node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          node-modules-${{ runner.os }}-
